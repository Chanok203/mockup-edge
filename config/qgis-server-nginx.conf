user www-data;
worker_processes auto;
error_log stderr;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ตั้งค่า Timeout ให้สูงหน่อย เผื่อกรณี QGIS ประมวลผลแผนที่หนักๆ
    fastcgi_read_timeout 300s;
    fastcgi_send_timeout 300s;

    server {
        listen 80 default_server;
        server_name _;

        # --- ส่วนของ CORS (Global) ---
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        location / {
            # จัดการ Preflight request (OPTIONS) สำหรับ Browser
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            root /usr/share/nginx/html;
            index index.html;
        }

        # จุดที่แก้: รับทั้ง /ows และ /ows/ (กันพลาด 404)
        location ~ ^/ows/? {
            # ส่งต่อไปยัง Internal location /qgis/
            # $is_args$args จะช่วยส่งพารามิเตอร์ทั้งหมดใน URL ไปด้วย
            rewrite ^/ows/?(.*)$ /qgis/$1 last;
        }

        # ส่วนที่คุยกับ QGIS FastCGI
        location /qgis/ {
            internal;
            
            # ตรวจสอบพอร์ต: qgis/qgis-server:ltr ปกติใช้ 9993
            # ถ้าต่อไม่ติด (502) ให้ลองเปลี่ยนเป็น localhost:9000
            fastcgi_pass localhost:9993;

            include fastcgi_params;
            
            # ตำแหน่งไฟล์ executable ของ QGIS ใน Container
            fastcgi_param SCRIPT_FILENAME /usr/lib/cgi-bin/qgis_mapserv.fcgi;
            
            # พารามิเตอร์สำคัญ: 
            # ถ้าใน URL มีการส่ง &map=... มา QGIS จะใช้ตัวนั้น
            # แต่ถ้าไม่มี เราจะกำหนดค่า Default ให้ที่นี่
            fastcgi_param QGIS_PROJECT_FILE $arg_map; 
            
            # ส่งค่าอื่นๆ ที่จำเป็น
            fastcgi_param QUERY_STRING    $query_string;
            fastcgi_param REQUEST_METHOD  $request_method;
            fastcgi_param CONTENT_TYPE    $content_type;
            fastcgi_param CONTENT_LENGTH  $content_length;
            fastcgi_param GATEWAY_INTERFACE CGI/1.1;
            fastcgi_param SERVER_SOFTWARE   nginx/$nginx_version;
            fastcgi_param REMOTE_ADDR       $remote_addr;
            fastcgi_param SERVER_ADDR       $server_addr;
            fastcgi_param SERVER_PORT       $server_port;
            fastcgi_param SERVER_NAME       $server_name;
            
            # ย้ำ CORS ในระดับ FastCGI อีกครั้ง
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
    }
}