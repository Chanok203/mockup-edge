services:
  postgres:
    image: postgis/postgis:16-3.5
    volumes:
      - ./data/postgres/data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=edge
      - POSTGRES_PASSWORD=51b0965b8de7eb1e9a6d9a8aaa559b80
    restart: unless-stopped
  
  redis:
    image: redis:alpine
    ports:
      - 6379:6379
    restart: unless-stopped

  qgis-server:
    image: qgis/qgis-server:ltr
    ports:
      - "8000:80"
    volumes:
      - ./data/qgis-server/data:/data
      - ./config/qgis-server-nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
